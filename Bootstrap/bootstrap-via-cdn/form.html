<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Via Download</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .h-100px{
            height: 100px;
        }
        .h2, h2{
            color: red
        }
    </style>
</head>
<body>
    <header>
        <h1 class="text-center">Botstrap Form</h1>
    </header>
    <main>
        <div class="container py-5">
            <div class="col-lg-8 mx-auto">
                <form action="#" class="needs-validation" novalidate>
                    <div class="row gy-3">
                        <div class="col-md-6">
                            <label for="fname" class="form-label">First Name <span class="text-danger">*</span></label>
                            <div class="input-group flex-wrap">
                                <span class="input-group-text">🙍🏻‍♂️</span>
                                <input type="text"  class="form-control" name="fname" id="fname" required>
                                <div class="invalid-feedback w-100">
                                    Name is required
                                </div>
                            </div>
                            
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" placeholder="Last Name" class="form-control" name="lname" id="lname">
                                <label for="lname" class="form-label">Last Name</label>

                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label">Email</label>
                            <div class="input-group">
                                <input type="text" class="form-control form-control-sm" name="username" id="username" required>
                                <span class="input-group-text">@</span>
                                <input type="text" class="form-control form-control-sm" name="domain" id="domain" value="indixpert.com">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="mobile" class="form-label">Mobile</label>
                            <input type="tel" class="form-control form-control-lg" name="mobile" id="mobile">
                        </div>
                        <div class="col-md-6">
                            <label for="color">Color</label>
                            <input type="color" name="color" id="color" class="form-control form-control-color">
                        </div>
                        <div class="col-md-6">
                            <label for="skill">Skill</label>
                            <input type="text" list="skillset" name="skill" id="skill" class="form-control" placeholder="Select Skill..">
                            <datalist id="skillset">
                                <option value="C" >
                                <option value="Python" >
                                <option value="HTML" >
                                <option value="CSS" >
                                <option value="JS" >
                                <option value="Bootstrap" >
                            </datalist>
                        </div>
                        <div class="col-md-6">
                            <label for="jobProfile" class="form-label">Job Profile</label>
                            <select name="jobProfile" class="form-select" id="jobProfile">
                                <option value="">Select Select One</option>
                                <option value="1">Product Manager</option>
                                <option value="2">Operation Manager</option>
                                <option value="3">HR Manager</option>
                            </select>
                        </div>
                        <div class="col-md-12">
                            <label for="comment" class="form-label">Message</label>
                            <textarea name="comment" id="comment" class="form-control"></textarea>
                        </div>
                        <div class="col-12">
                            <button class="btn btn-primary">Submit</button>
                        </div>
                    </div>

                </form>

                <form action="" class="mt-5">
                    <div class="input-group">
                        <input type="email" name="newsletteremail" class="form-control">
                        <button class="btn btn-primary">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        (() => {
            'use strict'

            // Fetch all the forms we want to apply custom Bootstrap validation styles to
            const forms = document.querySelectorAll('.needs-validation')

            // Loop over them and prevent submission
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }

                form.classList.add('was-validated')
                }, false)
            })
            })()
    </script>
</body>
</html>
